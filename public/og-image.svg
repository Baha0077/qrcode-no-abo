<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- QR Icon -->
  <rect x="480" y="80" width="60" height="60" rx="8" fill="white" opacity="0.2"/>
  <rect x="488" y="88" width="18" height="18" rx="3" fill="white"/>
  <rect x="514" y="88" width="18" height="18" rx="3" fill="white"/>
  <rect x="488" y="114" width="18" height="18" rx="3" fill="white"/>
  <rect x="514" y="114" width="8" height="8" rx="1" fill="white"/>
  <rect x="526" y="114" width="8" height="8" rx="1" fill="white"/>
  <rect x="514" y="126" width="8" height="8" rx="1" fill="white"/>
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">QR-Code Generator</text>
  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.9">Kostenlos · Open Source · Ohne Abo</text>
  <!-- Features -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.75">14 QR-Code Typen · 8 Rahmen-Templates · PNG, SVG, EPS, JPEG</text>
  <!-- Badges -->
  <rect x="310" y="420" width="180" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">Keine Cookies</text>
  <rect x="510" y="420" width="180" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="600" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">100% im Browser</text>
  <rect x="710" y="420" width="180" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="800" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">Kein Tracking</text>
  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.6">qrcode-no-abo.de</text>
